<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PokeCode</title>
    <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="images/flash.svg">
                pokecode
            </div>

            <div class="menu">
                <div class="menu-btn"><img src="images/help.svg">help</div>
                <div class="menu-btn"><img src="images/settings.svg">settings</div>
                <div class="menu-btn"><img src="images/account.svg">login</div>
                <div class="status">
                    <div class="status-btn xp"><img src="images/flame.svg"><span class="nrxp">240</span></div>
                    <div class="status-btn poke"><img src="images/pokeball.svg"><span class="nrpokemons">12</span>
                    </div>
                </div>
            </div>
        </nav>
        <div class="level-progress-indicator">
            <div class="level level-active"><span>1</span></div>
            <div class="level level-active"><span>2</span></div>
            <div class="level level-active"><span>3</span></div>
            <div class="level level-active"><span>4</span></div>
            <div class="level level-active"><span>5</span></div>
            <div class="level"><span>6</span></div>
            <div class="level"><span>7</span></div>
            <div class="level"><span>8</span></div>
            <div class="level"><span>9</span></div>
            <div class="level"><span>10</span></div>
            <div class="level"></div>
        </div>
    </header>
    <main>
        <section class="play-section">
            <div id="btnContainer">
                <button class="reset actionbtn hover" id="reset"><img src="images/replay.svg"><span>reset</span></button>

                <button class="run actionbtn hover" id="run"><img src="images/play-arrow.svg"><span>run</span></button>
            </div>
            <div id="canvasContainer">
                <canvas id="canvas">
                    Your browser does not support HTML5 Canvas!
                </canvas>
            </div>

        </section>

        <section id="code-section">
            <div id="zone">
                <div class="tabs">
                    <button class="tablinks active" onclick="switchParent(event, 'parent1')">main</button>
                    <button class="tablinks" onclick="switchParent(event, 'parent2')">procedure</button>
                </div>

                <div class="code-area tabcontent parent" id="parent1" style="display: flex;">
                </div>

                <div class="code-area tabcontent" id="parent2">
                </div>
            </div>
            <div class="code-blocks-container">
                <div class="forward code-block draggable" data-instruction="forward" draggable="true">
                    <span>move forward</span>
                </div>
                <div class="turnleft code-block draggable" data-instruction="left" draggable="true">
                    <span>turn&nbsp;</span>
                    <div class="turn-menu" onclick="displayMenu(this)">
                        <div class="turn-value">left</div>
                        <div class="dropdown-arrow">
                            <image src="images/dropdown-arrow.svg"></image>
                        </div>
                    </div>
                    <div class="turn-options-menu">
                        <div class="turn-option" onclick="selectedOption(this)">left</div>
                        <div class="turn-option" onclick="selectedOption(this)">right</div>
                    </div>
                </div>
                <!-- <div id="turnright" class="turnright code-block draggable" data-instruction="left" draggable="true">
                    <span>turn right</span>   
                </div> -->
                <div class="catch code-block draggable" data-instruction="catch" draggable="true">
                    <span>catch</span>
                </div>
                <div class="proc code-block draggable" data-instruction="proc" draggable="true">
                    <span>procedure {}</span>
                </div>
                <div class="if code-block draggable" data-instruction="ifwall" draggable="true">
                    <span>if wall</span>
                </div>
                <div class="if code-block draggable" data-instruction="else" draggable="true">
                    <span>else</span>
                </div>
                <div class="if code-block draggable" data-instruction="endif" draggable="true">
                    <span>END if</span>
                </div>
                <div class="repeat code-block draggable" data-instruction="repeat" draggable="true">
                    <div>repeat</div>
                    <div class="nrit" onclick="increaseValue(this)">1</div>
                </div>
                <div class="repeat code-block draggable" data-instruction="endrepeat" draggable="true">
                    <span>END repeat</span>
                </div>
            </div>
        </section>
    </main>
    <footer>
    </footer>
    <script type="module" src="scripts/main.js"></script>
    <script src="scripts/utilities.js"></script>
</body>

</html>
